<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mijn account — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
  </head>
  <body data-page="account">
    <div class="dashboard">
      <aside id="sidebar-root" class="sidebar" aria-label="Hoofdnavigatie"></aside>
      <script src="/assets/js/sidebar-restore.js"></script>
      <div class="main-wrap">
        <header class="main-header">
          <h1 class="page-title">Mijn account</h1>
          <p class="header-date">Wachtwoord en profiel</p>
        </header>
        <main class="main-content">
          <div class="form-card" style="max-width: 28rem">
            <h2 class="card-title" style="margin-top: 0">Wachtwoord wijzigen</h2>
            <form id="form-password" class="add-track-form">
              <div class="form-group">
                <label class="form-label" for="pw-current">Huidig wachtwoord</label>
                <input class="input-field" id="pw-current" type="password" required autocomplete="current-password" />
              </div>
              <div class="form-group">
                <label class="form-label" for="pw-new">Nieuw wachtwoord</label>
                <input class="input-field" id="pw-new" type="password" required minlength="6" autocomplete="new-password" />
              </div>
              <div class="form-group">
                <label class="form-label" for="pw-new2">Nieuw wachtwoord (herhaal)</label>
                <input class="input-field" id="pw-new2" type="password" required minlength="6" autocomplete="new-password" />
              </div>
              <div id="pw-msg" class="alert" hidden role="status"></div>
              <button type="submit" class="btn btn-primary" style="width: auto">Wachtwoord opslaan</button>
            </form>
          </div>
          <p class="header-date" style="margin-top: 2rem">
            <a href="/dashboard" style="color: var(--color-accent-hover); font-weight: 600">← Terug naar dashboard</a>
          </p>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/js/sidebar.js"></script>
    <script type="module" src="/assets/js/account-page.js"></script>
  </body>
</html>
