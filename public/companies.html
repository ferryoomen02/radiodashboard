<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bedrijven — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
  </head>
  <body data-page="companies">
    <div class="dashboard">
      <aside id="sidebar-root" class="sidebar" aria-label="Hoofdnavigatie"></aside>
      <script src="/assets/js/sidebar-route-sync.js"></script>
      <script src="/assets/js/sidebar-restore.js"></script>
      <script type="module" src="/assets/js/portal-navigation.js"></script>
      <div class="main-wrap">
        <header class="main-header">
          <h1 class="page-title">Bedrijven</h1>
          <p class="header-date">Organisaties en tenants — zenders hangen onder een bedrijf.</p>
        </header>
        <main class="main-content">
          <div class="form-card" style="max-width: 36rem">
            <h2 class="card-title" style="margin-top: 0">Nieuw bedrijf</h2>
            <form id="form-company" class="add-track-form">
              <div class="form-group">
                <label class="form-label" for="co-name">Naam</label>
                <input class="input-field" id="co-name" required autocomplete="organization" />
              </div>
              <div class="form-group">
                <label class="form-label" for="co-slug">Slug (URL)</label>
                <input class="input-field" id="co-slug" placeholder="bijv. acme-radio" autocomplete="off" />
                <p class="empty-state" style="margin: 0.35rem 0 0; font-size: 0.85rem">
                  Leeg laten om automatisch uit de naam te maken.
                </p>
              </div>
              <button type="submit" class="btn btn-primary" style="width: auto">Bedrijf aanmaken</button>
              <div id="co-msg" class="alert" style="margin-top: 1rem" hidden role="status"></div>
            </form>
          </div>
          <div class="form-card" style="margin-top: 1.5rem">
            <h2 class="card-title" style="margin-top: 0">Overzicht</h2>
            <div id="co-alert" class="alert alert-error" hidden role="alert"></div>
            <div class="data-table-wrap">
              <table class="data-table" aria-label="Bedrijven">
                <thead>
                  <tr>
                    <th>Naam</th>
                    <th>Slug</th>
                    <th>Zenders</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="co-tbody">
                  <tr>
                    <td colspan="4" class="loading-shimmer">Laden…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/js/sidebar.js"></script>
    <script type="module" src="/assets/js/companies-page.js"></script>
  </body>
</html>
