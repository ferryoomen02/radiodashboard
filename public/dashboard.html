<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
  </head>
  <body data-page="dashboard">
    <div class="dashboard">
      <aside id="sidebar-root" class="sidebar" aria-label="Hoofdnavigatie"></aside>

      <div class="main-wrap">
        <header class="main-header">
          <div class="greeting-row">
            <h1 id="greeting-line"><span id="greeting-name">Laden…</span></h1>
            <span class="badge">SonicWave</span>
          </div>
          <p class="header-date" id="header-date"></p>
          <div id="super-station-bar" class="station-bar" hidden>
            <label for="active-station-select">Actieve zender</label>
            <select id="active-station-select" aria-label="Kies zender voor dashboard"></select>
          </div>
        </header>

        <main class="main-content">
          <div class="card-grid">
            <section class="card card-span-4" aria-labelledby="station-card-title">
              <h2 class="card-title" id="station-card-title">Station</h2>
              <div id="station-info-body"></div>
            </section>

            <section class="card card-span-5" aria-labelledby="now-card-title">
              <h2 class="card-title" id="now-card-title">Nu speelt</h2>
              <div id="now-playing-root"></div>
            </section>

            <section class="card card-span-3" aria-labelledby="user-card-title">
              <h2 class="card-title" id="user-card-title">Account</h2>
              <div class="user-placeholder">
                <div class="user-avatar" aria-hidden="true">👤</div>
                <p style="margin: 0; font-weight: 600; font-size: 0.9rem" id="user-display-name">—</p>
                <p class="email" id="user-email"></p>
                <p style="margin: 0.35rem 0 0">
                  <span class="role-pill" id="user-role-pill">—</span>
                </p>
                <p style="font-size: 0.75rem; color: var(--color-text-muted); margin: 0.75rem 0 0">
                  <a href="/account" style="color: var(--color-accent-hover); font-weight: 600">Wachtwoord wijzigen →</a>
                </p>
              </div>
            </section>

            <section class="card card-span-7" aria-labelledby="history-card-title">
              <h2 class="card-title" id="history-card-title">Trackgeschiedenis</h2>
              <div id="history-container"></div>
            </section>

            <section class="card card-span-5" aria-labelledby="add-card-title">
              <h2 class="card-title" id="add-card-title">Nummer toevoegen</h2>
              <p class="empty-state" style="margin: 0 0 1rem">
                Wordt direct <strong>nu speelt</strong>; het vorige nummer gaat naar de geschiedenis.
              </p>
              <form id="add-track-form" class="add-track-form">
                <div class="form-group">
                  <label class="form-label" for="track-artist">Artiest</label>
                  <input class="input-field" id="track-artist" name="artist" required autocomplete="off" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="track-title">Titel</label>
                  <input class="input-field" id="track-title" name="title" required autocomplete="off" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="track-duration">Duur (seconden, optioneel)</label>
                  <input
                    class="input-field"
                    id="track-duration"
                    name="durationSeconds"
                    type="number"
                    min="0"
                    step="1"
                    placeholder="bijv. 210"
                  />
                </div>
                <div id="add-track-error" class="alert alert-error" hidden role="alert"></div>
                <div
                  id="add-track-success"
                  class="alert"
                  style="background: var(--color-accent-soft); color: var(--color-accent-hover)"
                  hidden
                  role="status"
                ></div>
                <button type="submit" class="btn btn-primary">Toevoegen &amp; on air</button>
              </form>
            </section>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/js/sidebar.js"></script>
    <script type="module" src="/assets/js/dashboard.js"></script>
  </body>
</html>
