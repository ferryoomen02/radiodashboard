<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login-test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      label {
        display: block;
        margin-top: 0.75rem;
      }
      input {
        width: 100%;
        max-width: 24rem;
        padding: 0.4rem 0.5rem;
        margin-top: 0.25rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.45rem 1rem;
        cursor: pointer;
      }
      #status {
        margin-top: 0.75rem;
        color: #333;
      }
      #status.error {
        color: #a00;
      }
      #status.ok {
        color: #060;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        overflow: auto;
        border-radius: 6px;
        margin-top: 1rem;
        font-size: 0.85rem;
      }
      h2 {
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <h1>Login-test</h1>
    <p>Log in; het token wordt in <code>localStorage</code> gezet. Daarna kun je <code>GET /radio</code> aanroepen.</p>

    <form id="login-form" action="#" method="post">
      <label>
        E-mail
        <input type="email" id="email" name="email" autocomplete="username" required />
      </label>
      <label>
        Wachtwoord
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit">Login</button>
    </form>
    <p id="status" role="status"></p>

    <h2>Radio</h2>
    <button type="button" id="load-radio" disabled>Laad /radio</button>
    <pre id="radio-out">(nog geen data — eerst inloggen)</pre>

    <script>
      const TOKEN_KEY = "token";
      const statusEl = document.getElementById("status");
      const loadBtn = document.getElementById("load-radio");
      const outEl = document.getElementById("radio-out");

      function setStatus(msg, kind) {
        statusEl.textContent = msg;
        statusEl.className = kind || "";
      }

      function syncLoadButton() {
        loadBtn.disabled = !localStorage.getItem(TOKEN_KEY);
      }

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        setStatus("Bezig met inloggen…", "");
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setStatus(data.error || "Inloggen mislukt.", "error");
            return;
          }
          if (!data.token) {
            setStatus("Geen token in antwoord.", "error");
            return;
          }
          localStorage.setItem(TOKEN_KEY, data.token);
          setStatus("Ingelogd. Token opgeslagen in localStorage.", "ok");
          syncLoadButton();
        } catch (err) {
          setStatus("Netwerkfout: " + err.message, "error");
        }
      });

      document.getElementById("load-radio").addEventListener("click", async () => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) {
          outEl.textContent = "Geen token. Log eerst in.";
          return;
        }
        outEl.textContent = "Laden…";
        try {
          const res = await fetch("/radio", {
            headers: { Authorization: "Bearer " + token },
          });
          const text = await res.text();
          let pretty = text;
          try {
            pretty = JSON.stringify(JSON.parse(text), null, 2);
          } catch {
            /* plain text */
          }
          outEl.textContent = res.status + " " + res.statusText + "\n\n" + pretty;
        } catch (err) {
          outEl.textContent = "Fout: " + err.message;
        }
      });

      syncLoadButton();
      if (localStorage.getItem(TOKEN_KEY)) {
        setStatus("Er staat al een token in localStorage.", "ok");
      }
    </script>
  </body>
</html>
