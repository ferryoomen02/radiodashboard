<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inloggen — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
    <link rel="stylesheet" href="/assets/css/station-portal.css" />
  </head>
  <body>
    <div class="login-page station-portal-login" id="login-shell">
      <div class="login-card">
        <img id="login-brand-logo" alt="" hidden />
        <div class="brand-mark" id="login-brand-letter" aria-hidden="true">S</div>
        <h1 id="login-title">SonicWave</h1>
        <p class="login-subtitle" id="login-subtitle">Radio management platform</p>

        <div id="login-tenant-error" class="alert alert-error" hidden role="alert"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">E-mailadres</label>
            <input
              class="input-field"
              type="email"
              id="email"
              name="email"
              autocomplete="username"
              placeholder="jij@jouwstation.nl"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Wachtwoord</label>
            <input
              class="input-field"
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </div>
          <div id="login-error" class="alert alert-error" hidden role="alert"></div>
          <button type="submit" class="btn btn-primary" id="login-submit">Inloggen →</button>
        </form>
        <p id="login-register-wrap" style="margin-top: 1.25rem; font-size: 0.9rem; text-align: center">
          Uitnodiging ontvangen?
          <a id="login-register-link" href="/register" style="color: var(--color-accent-hover); font-weight: 600"
            >Account aanmaken</a
          >
        </p>
      </div>
      <p class="login-footer" id="login-footer-text">Interne toegang — SonicWave</p>
    </div>
    <script type="module" src="/assets/js/login.js"></script>
  </body>
</html>
