<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
  </head>
  <body data-page="media">
    <div class="dashboard">
      <aside id="sidebar-root" class="sidebar" aria-label="Hoofdnavigatie"></aside>
      <script src="/assets/js/sidebar-route-sync.js"></script>
      <script src="/assets/js/sidebar-restore.js"></script>
      <script type="module" src="/assets/js/portal-navigation.js"></script>
      <div class="main-wrap">
        <header class="main-header">
          <h1 class="page-title">Media</h1>
          <p class="header-date">Afbeeldingen voor dit station (uitbreidbaar voor DJ’s, nieuws, site)</p>
          <div id="super-media-bar" class="station-bar" hidden>
            <label for="media-station-select">Zender voor upload</label>
            <select id="media-station-select" aria-label="Zender"></select>
          </div>
        </header>
        <main class="main-content">
          <div class="form-card" style="max-width: 36rem">
            <h2 class="card-title" style="margin-top: 0">Upload</h2>
            <form id="form-upload" class="add-track-form">
              <div class="form-group">
                <label class="form-label" for="media-file">Afbeelding</label>
                <input class="input-field" id="media-file" type="file" accept="image/*" required />
              </div>
              <button type="submit" class="btn btn-primary" style="width: auto">Uploaden</button>
              <div id="media-msg" class="alert" style="margin-top: 1rem" hidden role="status"></div>
            </form>
          </div>
          <div id="media-alert" class="alert alert-error" hidden role="alert"></div>
          <div class="form-card" style="margin-top: 1.5rem">
            <h2 class="card-title" style="margin-top: 0">Bibliotheek</h2>
            <div id="media-grid" class="media-grid"></div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/js/sidebar.js"></script>
    <script type="module" src="/assets/js/media-page.js"></script>
  </body>
</html>
