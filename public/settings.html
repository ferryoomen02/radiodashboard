<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Branding & portal — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
  </head>
  <body data-page="settings">
    <div class="dashboard">
      <aside id="sidebar-root" class="sidebar" aria-label="Hoofdnavigatie"></aside>
      <script src="/assets/js/sidebar-route-sync.js"></script>
      <script src="/assets/js/sidebar-restore.js"></script>
      <script type="module" src="/assets/js/portal-navigation.js"></script>
      <div class="main-wrap">
        <header class="main-header">
          <h1 class="page-title">Branding & portal</h1>
          <p class="header-date">Logo, naam en vaste teksten voor het dashboard</p>
        </header>
        <main class="main-content">
          <div class="form-card">
            <h2 class="card-title" style="margin-top: 0">Branding</h2>
            <p class="empty-state" style="margin: 0 0 1rem; font-size: 0.9rem">
              Logo (bijv. 1080×500 px) wordt in de sidebar netjes geschaald. Zonder logo tonen we de eerste letter van de platformnaam.
            </p>
            <div class="settings-brand-preview" id="settings-logo-preview-wrap" hidden>
              <span class="form-label">Huidig logo</span>
              <div class="settings-logo-preview-box">
                <img id="settings-logo-preview" alt="" />
              </div>
              <button type="button" class="btn-secondary" id="settings-remove-logo" style="margin-top: 0.5rem">
                Logo verwijderen
              </button>
            </div>
            <form id="form-logo" class="add-track-form" style="margin-bottom: 1.5rem">
              <div class="form-group">
                <label class="form-label" for="settings-logo-file">Nieuw logo uploaden</label>
                <input class="input-field" id="settings-logo-file" type="file" accept="image/*" />
              </div>
              <div id="settings-logo-msg" class="alert" hidden role="status"></div>
              <button type="submit" class="btn btn-primary" id="settings-logo-submit">Logo uploaden</button>
            </form>
            <form id="form-brand-text" class="add-track-form">
              <div class="form-row-2">
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label" for="settings-platform-name">Platformnaam</label>
                  <input class="input-field" id="settings-platform-name" required maxlength="120" autocomplete="off" />
                </div>
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label" for="settings-subtitle">Subtitel</label>
                  <input class="input-field" id="settings-subtitle" maxlength="120" autocomplete="off" />
                </div>
              </div>
              <h2 class="card-title" style="margin: 1.5rem 0 0.75rem">Dashboard-teksten</h2>
              <div class="form-group">
                <label class="form-label" for="settings-welcome-title">Welkomtitel (optioneel)</label>
                <input
                  class="input-field"
                  id="settings-welcome-title"
                  maxlength="500"
                  placeholder="Leeg = standaard groet met je naam"
                  autocomplete="off"
                />
              </div>
              <div class="form-group">
                <label class="form-label" for="settings-welcome-text">Welkomstekst (optioneel)</label>
                <textarea
                  class="input-field"
                  id="settings-welcome-text"
                  rows="3"
                  maxlength="4000"
                  placeholder="Korte toelichting onder de titel"
                  style="resize: vertical; min-height: 4rem"
                ></textarea>
              </div>
              <div id="settings-save-msg" class="alert" hidden role="status"></div>
              <button type="submit" class="btn btn-primary">Teksten opslaan</button>
            </form>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/js/sidebar.js"></script>
    <script type="module" src="/assets/js/settings-page.js"></script>
  </body>
</html>
