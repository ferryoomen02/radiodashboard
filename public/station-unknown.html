<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zender niet gevonden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      rel="stylesheet"
    />
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1f5f9;
        color: #0f172a;
        padding: 1.5rem;
      }
      .box {
        max-width: 24rem;

      }
      h1 {

      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.5;
        font-size: 0.95rem;
      }

  </head>
  <body>
    <div class="box">
      <h1>Zender niet gevonden</h1>
      <p>
        Dit subdomein hoort bij geen actieve zender. Controleer het adres of neem contact op met je organisatie.
