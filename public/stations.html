<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zenders — SonicWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/portal.css" />
  </head>
  <body data-page="stations">
    <div class="dashboard">
      <aside id="sidebar-root" class="sidebar" aria-label="Hoofdnavigatie"></aside>
      <div class="main-wrap">
        <header class="main-header">
          <h1 class="page-title" id="stations-page-title">Zenders</h1>
          <p class="header-date">Beheer radiozenders (naam en omschrijving)</p>
        </header>
        <main class="main-content">
          <div id="stations-super-create" class="form-card" hidden>
            <h2 class="card-title" style="margin-top: 0">Nieuwe zender</h2>
            <form id="form-new-station" class="add-track-form">
              <div class="form-row-2">
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label" for="new-station-name">Naam</label>
                  <input class="input-field" id="new-station-name" required autocomplete="off" />
                </div>
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label" for="new-station-desc">Omschrijving (optioneel)</label>
                  <input class="input-field" id="new-station-desc" autocomplete="off" />
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="width: auto; margin-top: 1rem">
                Zender aanmaken
              </button>
              <div id="new-station-msg" class="alert" style="margin-top: 1rem" hidden role="status"></div>
            </form>
          </div>
          <div id="stations-alert" class="alert alert-error" hidden role="alert"></div>
          <div class="data-table-wrap">
            <table class="data-table" aria-label="Lijst zenders">
              <thead>
                <tr id="stations-thead-row">
                  <th>Naam</th>
                  <th>Omschrijving</th>
                  <th>Gebruikers</th>
                  <th>Tracks</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="stations-tbody"></tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/js/sidebar.js"></script>
    <script type="module" src="/assets/js/stations-page.js"></script>
  </body>
</html>
